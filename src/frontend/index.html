          The IC platform automatically handles:
          - SSL certificate provisioning via Let's Encrypt

          - HTTP to HTTPS redirect

          The secure padlock icon will appear automatically in browsers once
          the domain is registered with the boundary nodes.
          
          To complete the setup:
          1. Configure DNS records as described above
          2. Deploy this canister with the .well-known/ic-domains file
